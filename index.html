<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚釣りゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎣 魚釣りゲーム</h1>
            <div class="stats">
                <div class="stat">
                    <span class="label">スコア:</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="label">釣った魚:</span>
                    <span class="value" id="fishCount">0</span>
                </div>
                <div class="stat">
                    <span class="label">タイム:</span>
                    <span class="value" id="timer">30</span>s
                </div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <!-- 釣竿 -->
            <div class="rod" id="rod">
                <div class="rod-line"></div>
                <div class="rod-hook"></div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-primary">ゲーム開始</button>
            <button id="resetBtn" class="btn btn-secondary" disabled>リセット</button>
        </div>

        <div class="game-over" id="gameOver" style="display: none;">
            <div class="game-over-content">
                <h2>ゲーム終了!</h2>
                <p>最終スコア: <span id="finalScore">0</span></p>
                <p>釣った魚: <span id="finalFishCount">0</span>匹</p>
                <button id="retryBtn" class="btn btn-primary">もう一度プレイ</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
